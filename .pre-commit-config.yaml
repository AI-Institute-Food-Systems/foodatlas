default_language_version:
  python: python3

repos:
  # Fast checks first (all files)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: check-json
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]

  # Ruff — linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
        stages: [pre-commit]
      - id: ruff-format
        files: ^backend/
        stages: [pre-commit]

  # Bandit — security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        files: ^backend/
        exclude: /tests/
        stages: [pre-commit]
        additional_dependencies: ["bandit[toml]"]

  # Mypy — type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--explicit-package-bases]
        files: ^backend/
        stages: [pre-commit]

  # Backend tests — per sub-project on pre-push
  - repo: local
    hooks:
      - id: pytest-backend-api
        name: pytest (backend/api)
        entry: bash -c 'cd backend/api && uv run pytest'
        language: system
        pass_filenames: false
        always_run: true
        files: ^backend/api/
        stages: [pre-push]

      - id: pytest-backend-db
        name: pytest (backend/db)
        entry: bash -c 'cd backend/db && uv run pytest'
        language: system
        pass_filenames: false
        always_run: true
        files: ^backend/db/
        stages: [pre-push]

      - id: pytest-backend-ie
        name: pytest (backend/ie)
        entry: bash -c 'cd backend/ie && uv run pytest'
        language: system
        pass_filenames: false
        always_run: true
        files: ^backend/ie/
        stages: [pre-push]

      - id: pytest-backend-kgc
        name: pytest (backend/kgc)
        entry: bash -c 'cd backend/kgc && uv run pytest'
        language: system
        pass_filenames: false
        always_run: true
        files: ^backend/kgc/
        stages: [pre-push]

  # Frontend hooks — add eslint/prettier here when frontend is set up
