default_language_version:
  python: python3

repos:
  # Fast checks first (all files)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: check-json
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]

  # Ruff — linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(backend|infra/aws)/
        stages: [pre-commit]
      - id: ruff-format
        files: ^(backend|infra/aws)/
        stages: [pre-commit]

  # Bandit — security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        files: ^(backend|infra/aws)/
        exclude: /tests/
        stages: [pre-commit]
        additional_dependencies: ["bandit[toml]"]

  # Mypy — type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [--explicit-package-bases]
        files: ^(backend|infra/aws)/
        stages: [pre-commit]
        additional_dependencies:
          - types-requests>=2.31.0
          - types-beautifulsoup4>=4.12.0
          - types-PyYAML>=6.0.0

  # Backend tests — per sub-project on pre-push
  - repo: local
    hooks:
      - id: pytest-backend-api
        name: pytest (backend/api)
        entry: bash -c 'cd backend/api && uv run pytest'
        language: system
        pass_filenames: false
        files: ^backend/api/
        stages: [pre-push]

      - id: pytest-backend-db
        name: pytest (backend/db)
        entry: bash -c 'cd backend/db && uv run pytest'
        language: system
        pass_filenames: false
        files: ^backend/db/
        stages: [pre-push]

      - id: pytest-backend-ie
        name: pytest (backend/ie)
        entry: bash -c 'cd backend/ie && uv run pytest'
        language: system
        pass_filenames: false
        files: ^backend/ie/
        stages: [pre-push]

      - id: pytest-backend-kgc
        name: pytest (backend/kgc)
        entry: bash -c 'cd backend/kgc && uv run pytest'
        language: system
        pass_filenames: false
        files: ^backend/kgc/
        stages: [pre-push]

      - id: pytest-infra-aws
        name: pytest (infra/aws)
        entry: bash -c 'cd infra/aws && uv run pytest'
        language: system
        pass_filenames: false
        files: ^infra/aws/
        stages: [pre-push]

  # Frontend hooks
  - repo: local
    hooks:
      - id: eslint-frontend
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npx eslint --max-warnings=0'
        language: system
        types_or: [javascript, tsx, ts]
        files: ^frontend/
        stages: [pre-commit]
