default_language_version:
  python: python3

repos:
  # Fast checks first (all files)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: check-json
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]

  # Backend Python hooks — all use uv run so versions match uv.lock
  # Project list is defined once in scripts/run-python-hook.sh
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        entry: scripts/run-python-hook.sh ruff check --fix --exit-non-zero-on-fix .
        language: system
        pass_filenames: false
        files: ^(backend|infra/aws)/
        stages: [pre-commit]

      - id: ruff-format
        name: ruff format
        entry: scripts/run-python-hook.sh ruff format .
        language: system
        pass_filenames: false
        files: ^(backend|infra/aws)/
        stages: [pre-commit]

      - id: bandit
        name: bandit security scan
        entry: scripts/run-python-hook.sh bandit -c {ROOT}/pyproject.toml -r {SRC}
        language: system
        pass_filenames: false
        files: ^(backend|infra/aws)/
        exclude: /tests/
        stages: [pre-commit]

      - id: mypy
        name: mypy type check
        entry: scripts/run-python-hook.sh mypy --explicit-package-bases {SRC}
        language: system
        pass_filenames: false
        files: ^(backend|infra/aws)/
        stages: [pre-commit]

      # Backend tests — per sub-project on pre-push
      - id: pytest-backend-api
        name: pytest (backend/api)
        entry: bash -c 'cd backend/api && uv run pytest'
        language: system
        pass_filenames: false
        files: ^backend/api/
        stages: [pre-push]

      - id: pytest-backend-db
        name: pytest (backend/db)
        entry: bash -c 'cd backend/db && uv run pytest'
        language: system
        pass_filenames: false
        files: ^backend/db/
        stages: [pre-push]

      - id: pytest-backend-ie
        name: pytest (backend/ie)
        entry: bash -c 'cd backend/ie && uv run pytest'
        language: system
        pass_filenames: false
        files: ^backend/ie/
        stages: [pre-push]

      - id: pytest-backend-kgc
        name: pytest (backend/kgc)
        entry: bash -c 'cd backend/kgc && uv run pytest'
        language: system
        pass_filenames: false
        files: ^backend/kgc/
        stages: [pre-push]

      - id: pytest-infra-aws
        name: pytest (infra/aws)
        entry: bash -c 'cd infra/aws && uv run pytest'
        language: system
        pass_filenames: false
        files: ^infra/aws/
        stages: [pre-push]

  # Frontend hooks
  - repo: local
    hooks:
      - id: eslint-frontend
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npx eslint --max-warnings=0'
        language: system
        types_or: [javascript, tsx, ts]
        files: ^frontend/
        stages: [pre-commit]
