name: CI

on:
  pull_request:
    branches:
      - dev
    paths:
      - "backend/**"
      - "frontend/**"
      - "!**/*.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which sub-projects have changes
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
      db: ${{ steps.filter.outputs.db }}
      ie: ${{ steps.filter.outputs.ie }}
      kgc: ${{ steps.filter.outputs.kgc }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - "backend/api/**"
              - "!backend/api/**/*.md"
            db:
              - "backend/db/**"
              - "!backend/db/**/*.md"
            ie:
              - "backend/ie/**"
              - "!backend/ie/**/*.md"
            kgc:
              - "backend/kgc/**"
              - "!backend/kgc/**/*.md"
            frontend:
              - "frontend/**"
              - "!frontend/**/*.md"

  backend-lint:
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.db == 'true' || needs.changes.outputs.ie == 'true' || needs.changes.outputs.kgc == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          src: backend/
          args: check

      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          src: backend/
          args: format --check

  backend-security:
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.db == 'true' || needs.changes.outputs.ie == 'true' || needs.changes.outputs.kgc == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install "bandit[toml]"

      - name: Bandit security scan
        run: bandit -c pyproject.toml -r backend/ --exclude "**/tests,**/.venv"

  backend-typecheck:
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.db == 'true' || needs.changes.outputs.ie == 'true' || needs.changes.outputs.kgc == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mypy
        run: pip install mypy

      - name: Mypy type check
        run: mypy --explicit-package-bases --exclude '\.venv' backend/

  backend-test:
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.db == 'true' || needs.changes.outputs.ie == 'true' || needs.changes.outputs.kgc == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests for changed projects
        run: |
          projects=""
          [[ "${{ needs.changes.outputs.api }}" == "true" ]] && projects="$projects api"
          [[ "${{ needs.changes.outputs.db }}" == "true" ]] && projects="$projects db"
          [[ "${{ needs.changes.outputs.ie }}" == "true" ]] && projects="$projects ie"
          [[ "${{ needs.changes.outputs.kgc }}" == "true" ]] && projects="$projects kgc"
          for project in $projects; do
            echo "::group::test backend/$project"
            cd backend/$project && uv sync && uv run pytest
            cd ../..
            echo "::endgroup::"
          done

  frontend-lint:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npm run lint

  frontend-build:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

  frontend-test:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Test
        run: cd frontend && npm test
