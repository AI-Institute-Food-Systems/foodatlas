name: CI

on:
  pull_request:
    branches:
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which sub-projects have changes via git diff
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      frontend: ${{ steps.diff.outputs.frontend }}
      python_projects: ${{ steps.diff.outputs.python_projects }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: diff
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.sha }}
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- ':!*.md')
          echo "frontend=$( echo "$CHANGED" | grep -q '^frontend/' && echo true || echo false )" >> "$GITHUB_OUTPUT"
          # python_projects carries {path, src} per project so all per-project
          # jobs can `cd path` and target `src` uniformly across backend (src/)
          # and infra/aws (stacks/).
          python_projects='[]'
          for p in api db ie kgc; do
            if echo "$CHANGED" | grep -q "^backend/$p/"; then
              python_projects=$(jq -cn --argjson a "$python_projects" --arg path "backend/$p" \
                '$a + [{path: $path, src: "src"}]')
            fi
          done
          if echo "$CHANGED" | grep -q "^infra/aws/"; then
            python_projects=$(jq -cn --argjson a "$python_projects" \
              '$a + [{path: "infra/aws", src: "stacks"}]')
          fi
          echo "python_projects=$python_projects" >> "$GITHUB_OUTPUT"

  python-lint:
    needs: changes
    if: needs.changes.outputs.python_projects != '[]'
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.changes.outputs.python_projects) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ruff lint ${{ matrix.project.path }}
        run: cd ${{ matrix.project.path }} && uv sync && uv run ruff check .

      - name: Ruff format check ${{ matrix.project.path }}
        run: cd ${{ matrix.project.path }} && uv run ruff format --check .

  python-security:
    needs: changes
    if: needs.changes.outputs.python_projects != '[]'
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.changes.outputs.python_projects) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bandit security scan ${{ matrix.project.path }}
        run: cd ${{ matrix.project.path }} && uv sync && uv run bandit -c "$GITHUB_WORKSPACE/pyproject.toml" -r ${{ matrix.project.src }}

  python-typecheck:
    needs: changes
    if: needs.changes.outputs.python_projects != '[]'
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.changes.outputs.python_projects) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Mypy type check ${{ matrix.project.path }}
        run: cd ${{ matrix.project.path }} && uv sync && uv run mypy --explicit-package-bases ${{ matrix.project.src }}

  python-test:
    needs: changes
    if: needs.changes.outputs.python_projects != '[]'
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.changes.outputs.python_projects) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js (CDK synth, infra/aws only)
        if: matrix.project.path == 'infra/aws'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK CLI (infra/aws only)
        if: matrix.project.path == 'infra/aws'
        run: npm install -g aws-cdk@2

      - name: Test ${{ matrix.project.path }}
        run: cd ${{ matrix.project.path }} && uv sync && uv run pytest

      - name: CDK synth (infra/aws only)
        if: matrix.project.path == 'infra/aws'
        run: cd infra/aws && uv run cdk synth --quiet
        env:
          CDK_DEFAULT_ACCOUNT: "000000000000"
          CDK_DEFAULT_REGION: us-east-1

  frontend-lint:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npm run lint

  frontend-build:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

  frontend-test:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Test
        run: cd frontend && npm test

  # Aggregate all CI jobs into a single pass/fail signal. This is the
  # only check required in the protect-dev ruleset: it always runs on
  # PRs to dev (no workflow-level paths filter), so required checks
  # never deadlock.
  ci-success:
    needs:
      - changes
      - python-lint
      - python-security
      - python-typecheck
      - python-test
      - frontend-lint
      - frontend-build
      - frontend-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all needed jobs passed or skipped cleanly
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          failed=$(echo "$NEEDS" | jq -r 'to_entries[] | select(.value.result == "failure" or .value.result == "cancelled") | .key')
          if [ -n "$failed" ]; then
            echo "::error::Failed or cancelled jobs:"
            echo "$failed"
            exit 1
          fi
          echo "All jobs passed or skipped cleanly."
