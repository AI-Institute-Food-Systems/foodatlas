name: CI

on:
  pull_request:
    branches:
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which sub-projects have changes via git diff
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      api: ${{ steps.diff.outputs.api }}
      db: ${{ steps.diff.outputs.db }}
      ie: ${{ steps.diff.outputs.ie }}
      kgc: ${{ steps.diff.outputs.kgc }}
      frontend: ${{ steps.diff.outputs.frontend }}
      infra_cdk: ${{ steps.diff.outputs.infra_cdk }}
      backend_projects: ${{ steps.diff.outputs.backend_projects }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: diff
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.sha }}
          CHANGED=$(git diff --name-only "$BASE" "$HEAD" -- ':!*.md')
          echo "api=$( echo "$CHANGED" | grep -q '^backend/api/' && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "db=$(  echo "$CHANGED" | grep -q '^backend/db/'  && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "ie=$(  echo "$CHANGED" | grep -q '^backend/ie/'  && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "kgc=$( echo "$CHANGED" | grep -q '^backend/kgc/' && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "frontend=$( echo "$CHANGED" | grep -q '^frontend/' && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "infra_cdk=$( echo "$CHANGED" | grep -q '^infra/cdk/' && echo true || echo false )" >> "$GITHUB_OUTPUT"
          projects='[]'
          for p in api db ie kgc; do
            if echo "$CHANGED" | grep -q "^backend/$p/"; then
              projects=$(jq -cn --argjson a "$projects" --arg p "$p" '$a + [$p]')
            fi
          done
          echo "backend_projects=$projects" >> "$GITHUB_OUTPUT"

  python-lint:
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.db == 'true' || needs.changes.outputs.ie == 'true' || needs.changes.outputs.kgc == 'true' || needs.changes.outputs.infra_cdk == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.8"
          src: backend/ infra/cdk/
          args: check

      - name: Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.8"
          src: backend/ infra/cdk/
          args: format --check

  python-security:
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.db == 'true' || needs.changes.outputs.ie == 'true' || needs.changes.outputs.kgc == 'true' || needs.changes.outputs.infra_cdk == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install "bandit[toml]"

      - name: Bandit security scan
        run: bandit -c pyproject.toml -r backend/ infra/cdk/ --exclude "backend/api/tests,backend/db/tests,backend/ie/tests,backend/kgc/tests,backend/api/.venv,backend/db/.venv,backend/ie/.venv,backend/kgc/.venv,infra/cdk/tests,infra/cdk/.venv"

  python-typecheck:
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.db == 'true' || needs.changes.outputs.ie == 'true' || needs.changes.outputs.kgc == 'true' || needs.changes.outputs.infra_cdk == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mypy
        run: pip install mypy types-requests types-beautifulsoup4 types-PyYAML

      - name: Mypy type check
        run: mypy --explicit-package-bases --exclude '\.venv' backend/ infra/cdk/

  backend-test:
    needs: changes
    if: needs.changes.outputs.backend_projects != '[]'
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.changes.outputs.backend_projects) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test backend/${{ matrix.project }}
        run: cd backend/${{ matrix.project }} && uv sync && uv run pytest

  infra-cdk-test:
    needs: changes
    if: needs.changes.outputs.infra_cdk == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js (for cdk synth)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK CLI
        run: npm install -g aws-cdk@2

      - name: Run CDK tests
        run: cd infra/cdk && uv sync && uv run pytest

      - name: CDK synth
        run: cd infra/cdk && uv run cdk synth --quiet
        env:
          CDK_DEFAULT_ACCOUNT: "000000000000"
          CDK_DEFAULT_REGION: us-east-1

  frontend-lint:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npm run lint

  frontend-build:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

  frontend-test:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Test
        run: cd frontend && npm test

  # Aggregate all CI jobs into a single pass/fail signal. This is the
  # only check required in the protect-dev ruleset: it always runs on
  # PRs to dev (no workflow-level paths filter), so required checks
  # never deadlock.
  ci-success:
    needs:
      - changes
      - python-lint
      - python-security
      - python-typecheck
      - backend-test
      - infra-cdk-test
      - frontend-lint
      - frontend-build
      - frontend-test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all needed jobs passed or skipped cleanly
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          failed=$(echo "$NEEDS" | jq -r 'to_entries[] | select(.value.result == "failure" or .value.result == "cancelled") | .key')
          if [ -n "$failed" ]; then
            echo "::error::Failed or cancelled jobs:"
            echo "$failed"
            exit 1
          fi
          echo "All jobs passed or skipped cleanly."
