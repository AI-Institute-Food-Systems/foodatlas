# Root-level tool configuration for the monorepo.
# This is NOT a Python package — it only configures shared dev tools.

# RUFF
[tool.ruff]
target-version = "py312"
line-length = 88
src = ["backend/*/src"]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
    "ARG",    # flake8-unused-arguments
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "PTH",    # flake8-use-pathlib
    "ERA",    # eradicate
    "PL",     # Pylint
    "RUF",    # Ruff-specific
]
ignore = [
    "PLR0913",  # Too many arguments
    "PLR2004",  # Magic value comparison
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**/*.py" = ["ARG", "PLR2004"]
"**/preprocessing/constants/greek_letters.py" = ["RUF001"]
"**/preprocessing/constants/punctuations.py" = ["RUF001"]
"**/tests/test_preprocessing_constants.py" = ["RUF001"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# MYPY
[tool.mypy]
python_version = "3.12"
explicit_package_bases = true
warn_return_any = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
check_untyped_defs = true
no_implicit_optional = true
strict_equality = true
show_error_codes = true
pretty = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

# BANDIT
[tool.bandit]
exclude_dirs = ["**/tests"]
skips = ["B101", "B311"]
