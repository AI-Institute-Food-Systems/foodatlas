services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: foodatlas
      POSTGRES_USER: foodatlas
      POSTGRES_PASSWORD: foodatlas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodatlas"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
